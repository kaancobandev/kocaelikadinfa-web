[build]
  command = "npm run build"
  publish = "dist"

# Netlify Image CDN'in Supabase Storage'daki görselleri
# yeniden boyutlandırmasına izin ver (src/lib/img.ts bu uç noktayı kullanıyor).
[images]
  remote_images = ["https://ysozqdfbmferemehaylv\\.supabase\\.co/storage/.*"]

# Dönüştürülmüş görseller içerikleriyle birlikte değişmez URL'lere sahip
# olduğundan uzun süre önbelleklenebilir.
[[headers]]
  for = "/.netlify/images"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
